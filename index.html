<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유럽 여행 일정 지도 2025</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
<style>
:root {
  --cream: #f5f0e8;
  --ink: #1a1208;
  --gold: #c8993a;
  --slate: #4a5568;
  --paper: #faf7f2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Serif KR', serif;
  background: var(--cream);
  color: var(--ink);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  background: var(--ink);
  color: var(--cream);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  border-bottom: 3px solid var(--gold);
}
.header-title { display: flex; align-items: baseline; gap: 12px; }
.header-title h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); }
.header-title span { font-size: 11px; color: #9a8878; letter-spacing: 2px; text-transform: uppercase; }
.header-info { font-size: 11px; color: #9a8878; }
.day-selector {
  background: var(--paper);
  border-bottom: 1px solid rgba(200,153,58,0.3);
  padding: 8px 14px;
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
}
.day-selector::-webkit-scrollbar { display: none; }
.day-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1.5px solid rgba(200,153,58,0.4);
  color: var(--slate);
  font-family: 'Noto Serif KR', serif;
  font-size: 11px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.day-btn:hover { border-color: var(--gold); color: var(--ink); background: rgba(200,153,58,0.08); }
.day-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; font-weight: 700; }
.day-btn.all-btn.active { background: var(--ink); border-color: var(--ink); }
.main {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.sidebar {
  flex-shrink: 0;
  background: var(--paper);
  border-bottom: 1px solid rgba(200,153,58,0.25);
  height: 220px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
}
.sidebar-inner {
  display: flex;
  flex-direction: row;
  min-height: 100%;
}
.sidebar-header {
  padding: 12px 16px 8px;
  border-bottom: 1px solid rgba(200,153,58,0.2);
  background: var(--paper);
  flex-shrink: 0;
  min-width: 160px;
  border-right: 1px solid rgba(200,153,58,0.15);
}
.sidebar-header h2 { font-family: 'Playfair Display', serif; font-size: 14px; color: var(--ink); }
.sidebar-header p { font-size: 11px; color: var(--slate); margin-top: 2px; }
#placeList {
  display: flex;
  flex-direction: row;
  flex-wrap: nowrap;
  overflow-x: auto;
  align-items: flex-start;
  padding: 6px 4px;
  gap: 0;
  scrollbar-width: thin;
  scrollbar-color: var(--gold) transparent;
  flex: 1;
}
.place-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  border-left: none;
  transition: all 0.15s;
  display: flex;
  flex-direction: row;
  gap: 8px;
  align-items: flex-start;
  min-width: 160px;
  max-width: 200px;
  flex-shrink: 0;
  border-right: 1px solid rgba(200,153,58,0.1);
  align-self: stretch;
}
.place-item:hover { background: rgba(200,153,58,0.06); border-bottom-color: var(--gold); }
.place-item.highlighted { background: rgba(200,153,58,0.12); border-bottom-color: var(--gold); }
.place-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--ink); color: #fff;
  font-size: 10px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-weight: 700;
}
.place-info { flex: 1; }
.place-name { font-size: 12px; font-weight: 600; color: var(--ink); line-height: 1.4; }
.place-desc { font-size: 10px; color: var(--slate); margin-top: 2px; line-height: 1.4; }
.place-time { font-size: 10px; color: var(--gold); margin-top: 2px; font-weight: 600; }
.day-group-header {
  writing-mode: vertical-rl;
  text-orientation: mixed;
  padding: 8px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  border-right: 1px solid rgba(200,153,58,0.2);
  flex-shrink: 0;
  align-self: stretch;
  display: flex;
  align-items: center;
  background: rgba(200,153,58,0.04);
}
#mapContainer { flex: 1; position: relative; min-height: 0; }
#leafletMap { width: 100%; height: 100%; }
.map-legend {
  position: absolute;
  bottom: 20px; right: 10px;
  background: rgba(26,18,8,0.88);
  color: var(--cream);
  padding: 10px 13px;
  border-radius: 8px;
  border: 1px solid var(--gold);
  font-size: 11px;
  z-index: 500;
  pointer-events: none;
  max-height: 260px;
  overflow-y: auto;
}
.legend-title { color: var(--gold); font-weight: 700; margin-bottom: 6px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 7px; margin-bottom: 3px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
/* Leaflet popup overrides */
.leaflet-popup-content-wrapper {
  background: #1a1208 !important;
  color: #f5f0e8 !important;
  border-radius: 8px !important;
  border: 1px solid #c8993a !important;
  box-shadow: 0 4px 20px rgba(0,0,0,0.45) !important;
}
.leaflet-popup-tip-container .leaflet-popup-tip { background: #1a1208 !important; }
.leaflet-popup-content { margin: 12px 15px !important; font-family: 'Noto Serif KR', serif !important; }
.pu-day { font-size: 10px; color: #c8993a; letter-spacing: 1px; margin-bottom: 3px; }
.pu-name { font-family: 'Playfair Display', serif; font-size: 15px; color: #f5f0e8; margin-bottom: 5px; line-height: 1.3; }
.pu-detail { font-size: 11px; color: #c8b89a; line-height: 1.6; }
</style>

      if (tested) return;
      tested = true;
      leafletMap.removeLayer(layer);
      loadTileProvider(idx + 1);
    });

    layer.on('tileload', function() {
      tested = true; // 하나라도 성공하면 이 provider 유지
    });

    layer.addTo(leafletMap);
    activeTileLayer = layer;
  }

  loadTileProvider(tileProviderIndex);

  var activeMarkers = [];
  var activeLines = [];
  var currentDay = 'all';

  function makeIcon(num, color) {
    return L.divIcon({
      className: '',
      html: '<div style="background:' + color + ';border:2.5px solid #fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.35);">' + num + '</div>',
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -18]
    });
  }

  function clearMapLayers() {
    activeMarkers.forEach(function(m) { leafletMap.removeLayer(m); });
    activeLines.forEach(function(l) { leafletMap.removeLayer(l); });
    activeMarkers = [];
    activeLines = [];
  }

  function renderDay(dayFilter) {
    clearMapLayers();
    var toShow = dayFilter === 'all' ? DAYS : DAYS.filter(function(d){ return d.day === dayFilter; });
    var bounds = [];

    toShow.forEach(function(d) {
      var color = DAY_COLORS[d.day - 1];
      var coords = d.places.map(function(p){ return [p.lat, p.lng]; });

      if (coords.length > 1) {
        var line = L.polyline(coords, {color: color, weight: 2.5, opacity: 0.55, dashArray: '6,5'}).addTo(leafletMap);
        activeLines.push(line);
      }

      d.places.forEach(function(p, i) {
        bounds.push([p.lat, p.lng]);
        var marker = L.marker([p.lat, p.lng], {icon: makeIcon(i + 1, color)}).addTo(leafletMap);
        marker.bindPopup(
          '<div class="pu-day">' + d.day + '일차 · ' + d.date + ' · ' + d.region + '</div>' +
          '<div class="pu-name">' + p.type + ' ' + p.name + '</div>' +
          '<div class="pu-detail">' + p.desc + (p.time ? '<br>🕐 ' + p.time : '') + '</div>',
          {maxWidth: 240}
        );
        marker._dayIdx = d.day;
        marker._placeIdx = i;
        activeMarkers.push(marker);
      });
    });

    if (bounds.length > 0) {
      var maxZoom = (dayFilter === 'all') ? 5 : 12;
      leafletMap.fitBounds(bounds, {padding: [40, 40], maxZoom: maxZoom});
    }

    updateSidebar(toShow);
    updateLegend(toShow);
  }

  function updateSidebar(toShow) {
    var titleEl = document.getElementById('sidebarTitle');
    var subEl = document.getElementById('sidebarSub');
    var listEl = document.getElementById('placeList');

    if (currentDay === 'all') {
      titleEl.textContent = '전체 일정';
      var total = toShow.reduce(function(a,d){ return a + d.places.length; }, 0);
      subEl.textContent = '총 ' + total + '개 장소';
    } else {
      titleEl.textContent = toShow[0].label + ': ' + toShow[0].region;
      subEl.textContent = toShow[0].date;
    }

    listEl.innerHTML = '';

    toShow.forEach(function(d) {
      var color = DAY_COLORS[d.day - 1];
      if (currentDay === 'all') {
        var hdr = document.createElement('div');
        hdr.className = 'day-group-header';
        hdr.style.color = color;
        hdr.textContent = d.label + ' · ' + d.date + ' · ' + d.region;
        listEl.appendChild(hdr);
      }

      d.places.forEach(function(p, i) {
        var item = document.createElement('div');
        item.className = 'place-item';

        var numEl = document.createElement('div');
        numEl.className = 'place-num';
        numEl.style.background = color;
        numEl.textContent = i + 1;

        var infoEl = document.createElement('div');
        infoEl.className = 'place-info';

        var nameEl = document.createElement('div');
        nameEl.className = 'place-name';
        nameEl.textContent = p.type + ' ' + p.name;

        var descEl = document.createElement('div');
        descEl.className = 'place-desc';
        descEl.textContent = p.desc;

        infoEl.appendChild(nameEl);
        infoEl.appendChild(descEl);

        if (p.time) {
          var timeEl = document.createElement('div');
          timeEl.className = 'place-time';
          timeEl.textContent = '🕐 ' + p.time;
          infoEl.appendChild(timeEl);
        }

        item.appendChild(numEl);
        item.appendChild(infoEl);

        (function(placeData, dayData, placeIdx) {
          item.addEventListener('click', function() {
            document.querySelectorAll('.place-item').forEach(function(el){ el.classList.remove('highlighted'); });
            item.classList.add('highlighted');
            leafletMap.setView([placeData.lat, placeData.lng], 14);
            var marker = activeMarkers.find(function(m){ return m._dayIdx === dayData.day && m._placeIdx === placeIdx; });
            if (marker) marker.openPopup();
          });
        })(p, d, i);

        listEl.appendChild(item);
      });
    });
  }

  function updateLegend(toShow) {
    var legend = document.getElementById('mapLegend');
    var html = '<div class="legend-title">일정</div>';
    toShow.forEach(function(d) {
      html += '<div class="legend-item"><div class="legend-dot" style="background:' + DAY_COLORS[d.day-1] + ';"></div><span>' + d.label + ' ' + d.date + '</span></div>';
    });
    legend.innerHTML = html;
  }

  // ── Day selector buttons ────────────────────────
  var selector = document.getElementById('daySelector');

  var allBtn = document.createElement('button');
  allBtn.className = 'day-btn all-btn active';
  allBtn.textContent = '전체';
  allBtn.addEventListener('click', function() {
    currentDay = 'all';
    document.querySelectorAll('.day-btn').forEach(function(b){ b.classList.remove('active'); });
    allBtn.classList.add('active');
    renderDay('all');
  });
  selector.appendChild(allBtn);

  DAYS.forEach(function(d) {
    var btn = document.createElement('button');
    btn.className = 'day-btn';
    btn.style.borderColor = DAY_COLORS[d.day - 1];
    btn.innerHTML = '<span style="color:' + DAY_COLORS[d.day-1] + ';font-weight:700;">' + d.label + '</span> ' + d.date;
    btn.addEventListener('click', function() {
      currentDay = d.day;
      document.querySelectorAll('.day-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      renderDay(d.day);
    });
    selector.appendChild(btn);
  });

  // ── Initial render ──────────────────────────────
  setTimeout(function() { leafletMap.invalidateSize(); }, 100);
  renderDay('all');

})();
</script>
</body>
</html>
